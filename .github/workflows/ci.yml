name: build
on:
  push:
jobs:
  ycsb-postgres-workloadf:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ycsb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Python 2
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python2

      - name: Download YCSB and PostgreSQL JDBC driver
        run: |
          wget https://github.com/brianfrankcooper/YCSB/releases/download/0.17.0/ycsb-0.17.0.tar.gz
          tar xfvz ycsb-0.17.0.tar.gz
          # Modify YCSB script to use Python 2
          sed -i '1s/python/python2/' ycsb-0.17.0/bin/ycsb
          wget -P ycsb-0.17.0/lib/ https://jdbc.postgresql.org/download/postgresql-42.6.0.jar

      - name: Create workload configuration
        run: |
          mkdir -p workloads
          cat > ./workloads/workloadf <<EOL
          workload=site.ycsb.workloads.CoreWorkload
          readallfields=true
          readproportion=0.5
          updateproportion=0.5
          scanproportion=0
          insertproportion=0
          requestdistribution=zipfian
          recordcount=100000
          operationcount=100000
          fieldcount=3
          fieldlength=100
          EOL

      - name: Create database table
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d ycsb -c \
            "CREATE TABLE IF NOT EXISTS usertable (
              ycsb_key VARCHAR(255) PRIMARY KEY,
              field0 TEXT,
              field1 TEXT,
              field2 TEXT
            );"

      - name: Load initial data
        run: |
          cd ycsb-0.17.0
          ./bin/ycsb load jdbc -s -P ../workloads/workloadf \
            -p db.driver=org.postgresql.Driver \
            -p db.url=jdbc:postgresql://localhost:5432/ycsb \
            -p db.user=postgres \
            -p db.passwd=postgres \
            -p jdbc.fetchsize=10 \
            -p jdbc.autocommit=true \
            -p db.batchsize=1000

      - name: Run Workload F
        run: |
          cd ycsb-0.17.0
          ./bin/ycsb run jdbc -s -P ../workloads/workloadf \
            -p db.driver=org.postgresql.Driver \
            -p db.url=jdbc:postgresql://localhost:5432/ycsb \
            -p db.user=postgres \
            -p db.passwd=postgres \
            -p jdbc.fetchsize=10 \
            -p jdbc.autocommit=true \
            -p db.batchsize=1000

  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
      - name: Rust Build Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: cfg-v2
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          sudo apt update && sudo apt install -y libfuse3-dev execstack
      - name: Build (mvsqlite)
        run: cargo build --locked --release -p mvsqlite
      - name: Build (mvsqlite-fuse)
        run: cargo build --locked --release -p mvsqlite-fuse
      - name: Build (shared libraries)
        run: make -C ./mvsqlite-preload build-preload && make -C ./mvsqlite-preload build-lib
      - name: Build (patched libsqlite3)
        run: |
          set -e
          curl -fL -o sqlite.zip https://www.sqlite.org/2023/sqlite-amalgamation-3410000.zip
          unzip sqlite.zip
          cp sqlite-amalgamation-3410000/sqlite3.c ./mvsqlite-preload/
          cd mvsqlite-preload
          patch -p1 ./sqlite3.c < ./sqlite-3410000.patch
          make build-patched-sqlite3
      - name: Build (mvstore-stress)
        run: cargo build --locked --release -p mvstore-stress
      - name: Collect binaries
        run: |
          set -e
          mkdir build
          cd build
          cp ../target/release/mvstore-stress ./
          cp ../target/release/mvsqlite-fuse ./
          cp ../mvsqlite-preload/libmvsqlite_preload.so ./
          cp ../mvsqlite-preload/libmvsqlite.a ./
          cp ../mvsqlite-preload/libsqlite3.so ./
          find . -type f -exec sha256sum '{}' ';'
      - name: Check binaries
        run: |
          set -e
          execstack -q ./build/libmvsqlite_preload.so | tee execstack.log
          grep -v '^X ' execstack.log
      - name: Push binaries
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: ./build
  stress:
    name: mvstore stress test
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Run it
        run: |
          set -e
          chmod +x ./build/mvstore-stress
          RUST_LOG=error,mvstore_stress=info ./build/mvstore-stress \
            --raw-data-prefix m --metadata-prefix mvstore-test --auto-create-namespace \
            --concurrency 50 --iterations 1000 --ns-key stress --pages 1000
  stress-disable-read-set:
    name: mvstore stress test (disable read set)
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Run it
        run: |
          set -e
          chmod +x ./build/mvstore-stress
          RUST_LOG=error,mvstore_stress=info ./build/mvstore-stress \
            --raw-data-prefix m --metadata-prefix mvstore-test --auto-create-namespace \
            --concurrency 50 --iterations 1000 --ns-key stress --pages 1000 --disable-read-set
  stress-small-gc-batch:
    name: mvstore stress test (small gc batch)
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Run it
        run: |
          set -e
          chmod +x ./build/mvstore-stress
          RUST_LOG=error,mvstore_stress=info ./build/mvstore-stress \
            --raw-data-prefix m --metadata-prefix mvstore-test --auto-create-namespace \
            --concurrency 50 --iterations 1000 --ns-key stress --pages 1000 \
            --knob-gc-scan-batch-size 50
  stress-gc-nofresh:
    name: mvstore stress test (gc without fresh time check)
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Run it
        run: |
          set -e
          chmod +x ./build/mvstore-stress
          RUST_LOG=error,mvstore_stress=info ./build/mvstore-stress \
            --raw-data-prefix m --metadata-prefix mvstore-test --auto-create-namespace \
            --concurrency 50 --iterations 1000 --ns-key stress --pages 1000 \
            --knob-gc-fresh-page-ttl-secs 0 --disable-ryw --permit-bad-page-reference
  stress-commit-multi-phase:
    name: mvstore stress test (gc without fresh time check + multi phase commit)
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Run it
        run: |
          set -e
          chmod +x ./build/mvstore-stress
          RUST_LOG=error,mvstore_stress=info ./build/mvstore-stress \
            --raw-data-prefix m --metadata-prefix mvstore-test --auto-create-namespace \
            --concurrency 50 --iterations 1000 --ns-key stress --pages 1000 \
            --knob-gc-fresh-page-ttl-secs 0 --knob-commit-multi-phase-threshold 0 \
            --knob-gc-scan-batch-size 50 --disable-ryw --permit-bad-page-reference
  stress-buggify:
    name: mvstore stress test (buggify)
    runs-on: ubuntu-22.04
    needs:
      - build
    # fdb_buggify randomizes fault injection itself, so unlike the other
    # deterministic-knob stress jobs its runtime and code-path coverage
    # already vary run to run - keep the workload small (this scale already
    # reliably reproduced the idempotency bugs found in local testing) so
    # that variance shows up as a fast pass/fail signal instead of adding
    # minutes to every CI run, and bound the worst case explicitly instead
    # of relying on the default multi-hour job timeout.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Run it
        run: |
          set -e
          chmod +x ./build/mvstore-stress
          RUST_LOG=error,mvstore_stress=info ./build/mvstore-stress \
            --raw-data-prefix m --metadata-prefix mvstore-test --auto-create-namespace \
            --concurrency 16 --iterations 300 --ns-key stress --pages 100 --fdb-buggify
  sqlite-speedtest1-default-page-size:
    name: SQLite benchmark (speedtest1), default page size
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Run it
        run: |
          set -e
          git clone https://github.com/sqlite/sqlite
          cd sqlite
          git checkout version-3.31.1 # ubuntu 20.04
          git apply ../res/ci/sqlite.patch
          gcc -O2 -o speedtest1 test/speedtest1.c -lsqlite3
          ./speedtest1 ./test.db
          LD_PRELOAD=../build/libmvsqlite_preload.so \
            MVSQLITE_RAW_DATA_PREFIX=m \
            MVSQLITE_METADATA_PREFIX=mvstore-test \
            MVSQLITE_AUTO_CREATE_NAMESPACE=1 \
            RUST_LOG=error ./speedtest1 test
  sqlite-speedtest1-16k-page:
    name: SQLite benchmark (speedtest1), 16K pages
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Run it
        run: |
          set -e
          git clone https://github.com/sqlite/sqlite
          cd sqlite
          git checkout version-3.31.1 # ubuntu 20.04
          git apply ../res/ci/sqlite.patch
          gcc -O2 -o speedtest1 test/speedtest1.c -lsqlite3
          ./speedtest1 ./test.db
          LD_PRELOAD=../build/libmvsqlite_preload.so \
            MVSQLITE_RAW_DATA_PREFIX=m \
            MVSQLITE_METADATA_PREFIX=mvstore-test \
            MVSQLITE_AUTO_CREATE_NAMESPACE=1 \
            MVSQLITE_SECTOR_SIZE=16384 \
            RUST_LOG=error ./speedtest1 test
  sqlite-speedtest1-default-page-size-fuse:
    name: SQLite benchmark (speedtest1), default page size, fuse
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
          sudo apt update && sudo apt install -y libfuse3-dev
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Run it
        run: |
          set -e
          git clone https://github.com/sqlite/sqlite
          cd sqlite
          git checkout version-3.31.1 # ubuntu 20.04
          git apply ../res/ci/sqlite.patch
          gcc -O2 -o speedtest1 test/speedtest1.c -lsqlite3
          ./speedtest1 ./test.db
          mkdir fusemnt
          chmod +x ../build/mvsqlite-fuse
          RUST_LOG=error ../build/mvsqlite-fuse \
            --raw-data-prefix m --metadata-prefix mvstore-test --auto-create-namespace \
            --mountpoint ./fusemnt \
            --namespaces "db=test" &
          sleep 1
          set +e
          ./speedtest1 ./fusemnt/db 2>&1 | tee log
          set -e
          grep "SQL error: no such table: t1" log
          echo "Got the expected error."
  build-ycsb:
    name: Build ycsb
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: |
          git clone https://github.com/V-Sekai/go-ycsb.git
          cd go-ycsb
          git checkout 855480a2485fe407df4b42c4d38a78e7d5786403
          make
      - name: Push binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-ycsb
          path: ./go-ycsb/bin/go-ycsb
  ycsb:
    name: ycsb
    runs-on: ubuntu-22.04
    needs:
      - build
      - build-ycsb
    strategy:
      matrix:
        workload: [workloadb]
        content_cache_size: ["0", "10000"]
        include:
          - workload: workloada
            content_cache_size: "0"
          - workload: workloadc
            content_cache_size: "0"
          - workload: workloadc
            content_cache_size: "10000"
          - workload: workloadf
            content_cache_size: "10000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          set -e
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-clients_7.1.53-1_amd64.deb --output fdb-client.deb
          sudo dpkg -i fdb-client.deb
          curl -L https://github.com/apple/foundationdb/releases/download/7.1.53/foundationdb-server_7.1.53-1_amd64.deb --output fdb-server.deb
          sudo dpkg -i fdb-server.deb
          sudo apt update && sudo apt install -y libfuse3-3
      - name: Fetch binaries
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Fetch go-ycsb
        uses: actions/download-artifact@v4
        with:
          name: go-ycsb
          path: ./go-ycsb
      - name: Run it
        run: |
          set -e
          chmod +x ./go-ycsb/go-ycsb

          # Preload mode
          PRELOAD_PATH="$PWD/build/libmvsqlite_preload.so" \
            MVSQLITE_PAGE_CACHE_SIZE=50000 \
            MVSQLITE_SECTOR_SIZE=16384 \
            MVSQLITE_RAW_DATA_PREFIX=m \
            MVSQLITE_METADATA_PREFIX=mvstore-test \
            MVSQLITE_AUTO_CREATE_NAMESPACE=1 \
            MVSQLITE_CONTENT_CACHE_SIZE="${{ matrix.content_cache_size }}" \
            RUST_LOG=off \
            ./res/ci/ycsb.sh ycsb "${{ matrix.workload }}"

  release:
    name: Release
    needs:
      - build
      - stress
      - stress-buggify
      - stress-small-gc-batch
      - stress-gc-nofresh
      - stress-commit-multi-phase
      - stress-disable-read-set
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            build/mvsqlite-fuse
            build/mvstore-stress
            build/libmvsqlite_preload.so
            build/libmvsqlite.a
            build/libsqlite3.so
          prerelease: true
